ytdl-raw-options=ignore-no-formats-error=,mark-watched=,cookies-from-browser=firefox,sub-langs="en,en-en,uk,uk-uk",write-auto-subs=,
# https://github.com/mpv-player/mpv/issues/10601 https://github.com/mpv-player/mpv/issues/9042#issuecomment-886113926 https://github.com/mpv-player/mpv/issues/8655
script-opts=ytdl_hook-try_ytdl_first=yes,ytdl_hook-exclude="%.webm$|%.ts$|%.mp3$|%.m3u8$|%.m3u$|%.mkv$|%.mp4$|%.VOB$"
screenshot-template='~/Мій диск/%{media-title} - %wH_%wM_%wS_%wT'
# NOTE: Prefer ≤1080p SDR non-AV1 non-VP9 video + audio; fallback to best
# ytdl-format=bestvideo[height<=1080][vcodec!~='^vp0?9(\.2)?'][dynamic_range=SDR][vcodec!*=av01]+bestaudio
# NOTE: Prefer 1600–2160p ≤30fps + audio; fallback to 1440p; else ≤1080p non-VP9; all constrained to SDR and non-AV1 (intended)
ytdl-format=(bestvideo[height<=2160][height>=1600][fps<=30]/bestvideo[height=1440]/bestvideo[height<=1080][vcodec!~='^vp0?9(\.2)?'])[dynamic_range=SDR][vcodec!*=av01]+bestaudio
hwdec=auto
volume=70
autocreate-playlist=same
autofit-larger=50%x50%
drag-and-drop=no
window-maximized=yes
# keepaspect-window=no
use-filedir-conf
alang='uk-uk,uk,ukr,ukrainian,japanese,ja,jap,jpn,ko,kor,english,eng,en,en-us,english,ru,rus,russian'
audio-file-auto=fuzzy
slang='en-en,en-us,english,eng,en,uk-uk,uk,ru-ru,rus,ru,russian'
sub-auto=fuzzy
# subs-fallback-forced=no
# HDR content is too dark on SDR monitor without this option https://github.com/iina/iina/issues/3406#issuecomment-841741855
tone-mapping=reinhard
# This option fixes this issue https://github.com/Syncplay/syncplay/issues/678
auto-window-resize=no
# workaround for my faulty gpu, avoides 1-2s stutter on fullscreen enter/exit/context menus
# d3d11-output-mode=composition

# TODO: enable new context menu on next release
# https://chatgpt.com/c/6979fe74-3188-838f-ba17-c0b091d3e529
#load-context-menu=yes
